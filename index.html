<!DOCTYPE html>
<html>
<head>
    <title>Fullscreen Image</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        img {
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* fills the entire screen */
            display: block;
        }
    </style>
</head>
<body>
    <img src="https://media.discordapp.net/attachments/1506493550219497676/1510336859065024563/image.png?ex=6a1e6c8f&is=6a1d1b0f&hm=00bc2b2a0f8bc89ebdec46c96f1afe49f4aa5db18da503f66a7764109b1b2951&=&format=webp&quality=lossless" alt="Fullscreen Image">
</body>
</html>
